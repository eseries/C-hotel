version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hotelpro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    env_file:
      - ./.env
    depends_on:
      - postgres
    ports:
      - '5000:5000'

  client:
    build: ./client
    depends_on:
      - server
    ports:
      - '5173:80'

volumes:
  postgres_data:
